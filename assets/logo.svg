<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- RAG Letters -->
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="url(#gradient1)">RAG</text>
  
  <!-- Document Icon -->
  <rect x="40" y="100" width="30" height="40" fill="url(#gradient2)" rx="2" opacity="0.8"/>
  <line x1="45" y1="110" x2="65" y2="110" stroke="white" stroke-width="2"/>
  <line x1="45" y1="120" x2="65" y2="120" stroke="white" stroke-width="2"/>
  <line x1="45" y1="130" x2="60" y2="130" stroke="white" stroke-width="2"/>
  
  <!-- Database Icon -->
  <ellipse cx="100" cy="120" rx="15" ry="8" fill="url(#gradient2)" opacity="0.8"/>
  <rect x="85" y="120" width="30" height="20" fill="url(#gradient2)" opacity="0.8"/>
  <ellipse cx="100" cy="140" rx="15" ry="8" fill="url(#gradient2)" opacity="0.8"/>
  
  <!-- AI Brain Icon -->
  <circle cx="140" cy="120" r="15" fill="url(#gradient2)" opacity="0.8"/>
  <circle cx="135" cy="115" r="3" fill="white"/>
  <circle cx="145" cy="115" r="3" fill="white"/>
  <circle cx="135" cy="125" r="3" fill="white"/>
  <circle cx="145" cy="125" r="3" fill="white"/>
  <circle cx="140" cy="120" r="3" fill="white"/>
  
  <!-- Connecting Lines -->
  <path d="M 70 120 L 85 120" stroke="url(#gradient1)" stroke-width="2" opacity="0.6"/>
  <path d="M 115 120 L 125 120" stroke="url(#gradient1)" stroke-width="2" opacity="0.6"/>
  
  <!-- Animated Pulse -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#gradient1)" stroke-width="2" opacity="0.3">
    <animate attributeName="r" from="90" to="110" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
